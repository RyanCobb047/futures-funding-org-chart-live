<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futures Funding Council of Agents</title>
  <style>
    :root {
      --bg: #081120;
      --panel: #0d1c33;
      --line: rgba(255,255,255,.10);
      --text: #eef4ff;
      --muted: #a9bbd6;
      --accent: #63c7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #081120, #0d1c33 60%, #081120);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(8, 17, 32, 0.82);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .top-inner {
      max-width: 1080px;
      margin: 0 auto;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }
    .btn.secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .card {
      margin-top: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }
    .hint {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .image-link {
      display: block;
      line-height: 0;
      background: #0b1730;
    }
    .image-link img {
      display: block;
      width: 100%;
      height: auto;
    }
    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 700px) {
      .top-inner {
        align-items: flex-start;
        flex-direction: column;
      }
      .actions {
        width: 100%;
        justify-content: stretch;
      }
      .btn {
        flex: 1 1 auto;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="top-inner">
      <div>
        <h1>Futures Funding Council of Agents</h1>
        <div class="sub">Mobile-friendly viewer</div>
      </div>
      <div class="actions">
        <a class="btn" href="council-of-agents.png" target="_blank" rel="noopener">Open Full Image</a>
        <a class="btn secondary" href="council-of-agents.png" download>Download PNG</a>
      </div>
    </div>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="hint">Tap the image or use “Open Full Image” to zoom in clearly.</div>
      <a class="image-link" href="council-of-agents.png" target="_blank" rel="noopener">
        <img src="council-of-agents.png" alt="Futures Funding Council of Agents org chart" />
      </a>
    </section>
    <div class="footer-note">This page was simplified for fast mobile viewing.</div>
  </main>
</body>
</html>
